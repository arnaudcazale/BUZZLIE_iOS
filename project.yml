name: BuzzlieTest
options:
  bundleIdPrefix: com.buzzlie
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: fr

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  BuzzlieTest:
    type: application
    platform: iOS
    sources:
      - path: BuzzlieTest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.buzzlie.testapp
        INFOPLIST_KEY_CFBundleDisplayName: BUZZLIE Test
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "BUZZLIE utilise le Bluetooth pour communiquer avec votre bracelet."
        GENERATE_INFOPLIST_FILE: "YES"

  BuzzlieTestTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BuzzlieTestTests
    dependencies:
      - target: BuzzlieTest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.buzzlie.testapp.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  BuzzlieTest:
    build:
      targets:
        BuzzlieTest: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BuzzlieTestTests
